      <stop offset="0" stop-color="#0b0b0d"/>
      <stop offset="1" stop-color="#1a1410"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c59d5f"/>
      <stop offset="1" stop-color="#e6c88f"/>
